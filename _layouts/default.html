<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/cybersec.css' | relative_url }}">
</head>
<body>
  <header class="container site-header">
    <div class="brand">
      <div class="logo">JE</div>
      <div>
        <div class="site-title">{{ site.title }}</div>
        <div style="font-size:0.85rem;color:var(--muted)">{{ site.tagline }}</div>
      </div>
    </div>
    {% include nav.html %}
  </header>
  <main class="container">
    {{ content }}
    <footer class="footer">
      <div>© {{ site.time | date: "%Y" }} {{ site.author.name }}</div>
    </footer>
  </main>
</body>
</html>
